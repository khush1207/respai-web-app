{% extends "base.html" %}
{% block content %}
<form method="POST">
    <h4>Day 1 Inputs</h4>
    <div class="row mb-4">
        <div class="col-md-4">
            <label>Age:</label>
            <input type="number" class="form-control" name="age" required value=" ">
        </div>
        <div class="col-md-4">
            <label>City:</label>
            <input type="text" class="form-control" name="city" required>
        </div>
        <div class="col-md-4">
            <label>Smoking History:</label><br>
            <input type="radio" class="btn-check" name="smoking" id="sm0" value="0" checked>
            <label class="btn btn-outline-secondary btn-sm" for="sm0">0</label>
            <input type="radio" class="btn-check" name="smoking" id="sm1" value="1">
            <label class="btn btn-outline-secondary btn-sm" for="sm1">1</label>
        </div>
    </div>
    <hr>
    <h5>Symptoms</h5>
    {% include 'symptoms_snippet.html' %}
    <button type="submit" class="btn btn-primary w-100 mt-4">Submit Day 1</button>
</form>
{% endblock %}
